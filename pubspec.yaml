name: lets_go_travel
description: "Let's Go Travel — AI-помощник для путешествий. Дешёвые авиабилеты, отели, трансферы."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.3

  # HTTP
  http: ^1.2.2

  # URL launcher
  url_launcher: ^6.3.1

  # Share
  share_plus: ^10.1.4

  # Markdown for AI responses
  flutter_markdown: ^0.7.7+1

  # AppMetrica analytics
  appmetrica_plugin: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/cross_promo/
